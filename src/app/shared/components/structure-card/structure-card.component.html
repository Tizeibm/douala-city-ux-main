<article class="premium-card" (click)="onView()">
    <div class="card-media">
        <img *ngIf="structure.photoPrincipal || structure.imageUrl"
            [src]="structure.photoPrincipal || structure.imageUrl" [alt]="structure.nom">
        <div *ngIf="!structure.photoPrincipal && !structure.imageUrl" class="placeholder-icon">
            <i class="fas fa-building"></i>
        </div>
        <div class="card-overlay">
            <span class="category-tag">{{structure.categorieNom}}</span>
        </div>
    </div>

    <div class="card-content">
        <div class="header-row">
            <h3 class="title">{{structure.nom}}</h3>
            <span class="status-indicator open">Ouvert</span>
        </div>

        <div class="rating-row">
            <div class="stars">
                <i *ngFor="let s of [1,2,3,4,5]" class="fas fa-star" [class.filled]="s <= 4"></i>
            </div>
            <span class="rating-text">4.2 (12 avis)</span>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <i class="fas fa-clock icon"></i>
                <span>{{getTodayHoraire()}}</span>
            </div>
            <div class="info-item" *ngIf="structure.localisation && structure.localisation.length > 0">
                <i class="fas fa-map-marker-alt icon"></i>
                <span>{{structure.localisation[0].quartier}}</span>
            </div>
        </div>

        <p class="description" *ngIf="structure.description">
            {{structure.description | slice:0:80}}{{structure.description.length > 80 ? '...' : ''}}
        </p>
    </div>

    <div class="card-footer">
        <button class="btn-primary-soft w-full" (click)="$event.stopPropagation(); onView()">
            Explorer <i class="fas fa-arrow-right ml-xs"></i>
        </button>
    </div>
</article>
