<section class="hero-section">
  <div class="hero-content">
    <h1 class="hero-title">DoualaCity</h1>
    <p class="hero-subtitle">Trouvez les meilleurs commerces, services et professionnels à Douala.</p>

    <div class="search-container">
      <form class="search-form" (ngSubmit)="onSearch()">
        <div class="input-group what">
          <i class="fas fa-search input-icon"></i>
          <input type="text" name="q" [(ngModel)]="searchQuery" placeholder="Quoi, qui ? (ex: Restaurant, Plombier...)"
            class="search-input">
        </div>
        <div class="divider"></div>
        <div class="input-group where">
          <i class="fas fa-map-marker-alt input-icon"></i>
          <select name="zone" [(ngModel)]="searchZone" class="search-select">
            <option value="">Où ? (Toute la ville)</option>
            <option value="Akwa">Akwa</option>
            <option value="Bonapriso">Bonapriso</option>
            <option value="Bonamoussadi">Bonamoussadi</option>
            <option value="Deïdo">Deïdo</option>
            <option value="Logbessou">Logbessou</option>
            <option value="Bali">Bali</option>
            <option value="Koumassi">Koumassi</option>
          </select>
        </div>
        <button type="submit" class="btn-search">
          Rechercher
        </button>
      </form>
    </div>

    <!-- <div class="hero-tags">
      <span>Populaire :</span>
      <a routerLink="/resultats" [queryParams]="{q: 'Pharmacie'}">Pharmacie</a>
      <a routerLink="/resultats" [queryParams]="{q: 'Restaurant'}">Restaurant</a>
      <a routerLink="/resultats" [queryParams]="{q: 'Hôtel'}">Hôtel</a>
    </div>-->
    <section class="section emergency-section">
      <div class="container">
        <div class="emergency-card">
          <div class="emergency-header">
            <i class="fas fa-phone-alt emergency-icon"></i>
            <div class="emergency-text">
              <h2 class="emergency-title">Besoin d'aide immédiate ?</h2>
              <p class="emergency-subtitle">Numéros d'urgence utiles à Douala</p>
            </div>
          </div>
          <div class="emergency-numbers-grid">
            <a href="tel:117" class="emergency-number-item">
              <span class="num-label">Police Secours</span>
              <span class="num-value">117</span>
            </a>
            <a href="tel:118" class="emergency-number-item">
              <span class="num-label">Sapeurs-Pompiers</span>
              <span class="num-value">118</span>
            </a>
            <a href="tel:119" class="emergency-number-item">
              <span class="num-label">SAMU (Urgences Médicales)</span>
              <span class="num-value">119</span>
            </a>
            <a href="tel:113" class="emergency-number-item">
              <span class="num-label">Gendarmerie</span>
              <span class="num-value">113</span>
            </a>
          </div>
        </div>
      </div>
    </section>

    <section class="section categories-section">
      <div class="container">
        <h2 class="section-title">Explorez par catégorie</h2>
        <div class="grid cols-4 categories-grid">
          <a routerLink="/categories/commerces" class="category-card">
            <div class="icon-wrapper">
              <i class="fas fa-shopping-bag"></i>
            </div>
            <span class="label">Commerces</span>
          </a>
          <a routerLink="/categories/institutions" class="category-card">
            <div class="icon-wrapper">
              <i class="fas fa-landmark"></i>
            </div>
            <span class="label">Institutions</span>
          </a>
          <a routerLink="/categories/education" class="category-card">
            <div class="icon-wrapper">
              <i class="fas fa-graduation-cap"></i>
            </div>
            <span class="label">Écoles</span>
          </a>
          <a routerLink="/categories/sante" class="category-card">
            <div class="icon-wrapper">
              <i class="fas fa-hospital-user"></i>
            </div>
            <span class="label">Hôpitaux</span>
          </a>
          <!--<a routerLink="/categories/services" class="category-card">
        <div class="icon-wrapper">
          <i class="fas fa-concierge-bell"></i>
        </div>
        <span class="label">Services</span>
      </a>
      <a routerLink="/categories/loisirs" class="category-card">
        <div class="icon-wrapper">
          <i class="fas fa-cocktail"></i>
        </div>
        <span class="label">Loisirs</span>
      </a>-->
        </div>
      </div>
    </section>
