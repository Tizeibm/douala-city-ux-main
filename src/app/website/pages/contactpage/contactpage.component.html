<section id="contact" class="bg-light">
    <div class="container">
    <h2 class="text-center">
     <i class="fas fa-enveloppe me-2"></i>
    Contactez-nous
    </h2>
    <div class="row justify-content-center mt-4">
    <div class="col md-8">
       <form>
         <div class="mb-3" >
            <label for="name" class="form-label" >Nom</label>
            <input type="text" id="name" class="form-control" placeholder="Votre nom"/>
             
         </div>
           <div class="mb-3" >
            <label for="email" class="form-label" >Email</label>
            <input type="email" id="email" class="form-control" placeholder="Votre email"/>
             
         </div>
           <div class="mb-3" >
            <label for="message" class="form-label" >Message</label>
         <textarea id="message" rows="4" class="form-control" placeholder="Votre message..." required ></textarea>
               </div>
     <div class="text-center" >
    <button class =" btn btn-primary" >
         <i class =" fas fa-paper-plane me-2" ></i>   
         
        Envoyer
    </button>   

    </div>
</form>  
    </div>
    
    </div>
     </div>
</section>
