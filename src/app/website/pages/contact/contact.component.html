<div class="info-page reveal">
  <div class="page-hero">
    <div class="container text-center">
      <h1 class="page-title text-gradient">Contactez-nous</h1>
      <p class="page-subtitle">Nous sommes à votre écoute pour toute question ou suggestion.</p>
    </div>
  </div>

  <div class="container section">
    <div class="contact-grid">
      <div class="contact-info">
        <div class="contact-card glass-card">
          <i class="fas fa-envelope"></i>
          <h3>Email</h3>
          <p>contact&#64;doualacity.cm</p>
        </div>
        <div class="contact-card glass-card">
          <i class="fas fa-phone-alt"></i>
          <h3>Téléphone</h3>
          <p>+237 690 00 00 00</p>
        </div>
        <div class="contact-card glass-card">
          <i class="fas fa-map-marker-alt"></i>
          <h3>Bureau</h3>
          <p>Akwa, Douala, Cameroun</p>
        </div>
      </div>

      <div class="contact-form-wrapper card p-md">
        <form class="contact-form">
          <div class="grid cols-2 gap-sm">
            <div class="mb-sm">
              <label>Nom Complet</label>
              <input type="text" placeholder="Ex: Jean Dupont">
            </div>
            <div class="mb-sm">
              <label>Email</label>
              <input type="email" placeholder="votre@email.com">
            </div>
          </div>
          <div class="mb-sm">
            <label>Sujet</label>
            <input type="text" placeholder="Votre sujet">
          </div>
          <div class="mb-md">
            <label>Message</label>
            <textarea rows="5" placeholder="Votre message..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-full py-3">Envoyer mon message</button>
        </form>
      </div>
    </div>
  </div>
</div>
