<header class="header">
  <div class="container nav-wrapper">
    <!-- Brand (always visible) -->
    <a routerLink="/accueil" class="brand" style="display: flex; align-items: center; gap: 10px;">
      <img src="/favicon.ico" class="logo-img" alt="Douala City" style="height: 40px; border-radius: 5px;"> Douala City
    </a>

    <!-- Mobile toggle (visible on small screens) -->
    <button class="mobile-toggle" (click)="toggleMenu($event)" aria-label="Menu de navigation">
      <i class="fas" [ngClass]="menuOuvert ? 'fa-times' : 'fa-bars'"></i>
    </button>

    <!-- All nav content inside one collapsible container -->
    <div class="nav-content" [ngClass]="{ 'open': menuOuvert }">
      <nav class="menu" role="navigation" aria-label="Navigation principale">
        <a routerLink="/accueil" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}"
          (click)="toggleMobile()">Accueil</a>

        <div class="submenu-container">
          <span class="submenu-title" (click)="isAnnuaireOpen = !isAnnuaireOpen">Annuaire <i
              class="fas fa-chevron-down"></i></span>
          <div class="submenu" [class.open]="isAnnuaireOpen">
            <a class="submenu-item" routerLink="/categories/commerces" routerLinkActive="active"
              (click)="toggleMobile()">Commerces</a>
            <a class="submenu-item" routerLink="/categories/institutions" routerLinkActive="active"
              (click)="toggleMobile()">Institutions</a>
            <a class="submenu-item" routerLink="/categories/education" routerLinkActive="active"
              (click)="toggleMobile()">Éducation</a>
            <a class="submenu-item" routerLink="/categories/sante" routerLinkActive="active"
              (click)="toggleMobile()">Santé</a>
            <a class="submenu-item" routerLink="/categories/services" routerLinkActive="active"
              (click)="toggleMobile()">Services</a>
            <a class="submenu-item" routerLink="/categories/hebergement" routerLinkActive="active"
              (click)="toggleMobile()">Hébergement</a>
            <a class="submenu-item" routerLink="/categories/transport" routerLinkActive="active"
              (click)="toggleMobile()">Transport</a>
            <a class="submenu-item" routerLink="/categories/loisirs" routerLinkActive="active"
              (click)="toggleMobile()">Loisirs</a>
            <a class="submenu-item" routerLink="/categories/restauration" routerLinkActive="active"
              (click)="toggleMobile()">Restauration</a>
          </div>
        </div>

        <a routerLink="/annonces" routerLinkActive="active" (click)="toggleMobile()">Annonces</a>
      </nav>

      <!-- Auth / User section (inside collapsible) -->
      <div class="nav-actions">
        <div class="auth-buttons" *ngIf="!utilisateur">
          <a routerLink="/inscription" (click)="toggleMobile()" class="cta cta-outline">S'inscrire</a>
          <a routerLink="/login" (click)="toggleMobile()" class="cta cta-primary">Se connecter</a>
        </div>

        <div *ngIf="utilisateur" class="user-info">
          <!-- Lien pour les simples utilisateurs -->
          <a *ngIf="utilisateur.role === 'USER'" routerLink="/dashboard-client" routerLinkActive="active" (click)="toggleMobile()">
            <i class="fas fa-user-circle"></i>
            {{utilisateur.nom}}
          </a>
          <!-- Lien pour les entreprises et admins -->
          <a *ngIf="utilisateur.role === 'ENTREPRISE' || utilisateur.role === 'ADMIN'" routerLink="/dashboard-user" routerLinkActive="active" (click)="toggleMobile()">
            <i class="fas fa-building"></i>
            {{utilisateur.nom}}
          </a>
          <a *ngIf="utilisateur.role === 'ADMIN'" routerLink="/admin" routerLinkActive="active" (click)="toggleMobile()">
            🛠️ Admin
          </a>
          <!-- Bouton déconnexion commun (ou on garde juste dans le menu déroulant, mais ici on remet le bouton simple) -->
          <button (click)="logout()">Déconnexion</button>
        </div>
        <app-notifications-center *ngIf="utilisateur"></app-notifications-center>
      </div>
    </div>
  </div>
</header>
