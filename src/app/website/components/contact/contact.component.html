<section id="contact" class="py-5 bg-light">
     <div class="container">
    <h2 class="text-center mb-4">
        <i class="fas fa-enveloppe me-2"></i>
    Contactez-nous
    </h2>
     <form class="w-75 mx-auto">
         <div class="mb-3">
             <label for="name" class="form-label">Nom</label>
               <input type="text" id="name" class="form-control" placeholder="Votre nom" required />
               </div>
                 <div class="mb-3">
             <label for="email" class="form-label">Email</label>
               <input type="email" id="email" class="form-control" placeholder="Votre email" required />
               </div> 
                <div class="mb-3">
             <label for="message" class="form-label">Messqge</label>
               <textarea id="message" rows="4" class="form-control" placeholder="Votre message" required ></textarea>
               </div>
    
    <button class =" btn btn-primary" required>
         <i class =" fas fa-paper-plane me-2" ></i>   
         
        Envoyer
    </button>   
         
  
     </form>
     </div>
    
</section>
