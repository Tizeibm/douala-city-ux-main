<main class="section">
  <div class="container">
    <h1>Recherche intelligente (IA)</h1>
    <p class="small">Décrivez votre besoin en langage naturel, l’IA propose des résultats pertinents.</p>
    <form class="grid" style="grid-template-columns:1fr auto;gap:.6rem">
      <input class="input" name="prompt" placeholder="Ex. Je cherche une école bilingue performante à Bonamoussadi">
      <button class="btn" routerLink="/resultats">Lancer</button>
    </form>

    <div class="section">
      <h2>Exemples</h2>
      <ul>
        <li>“Je veux un pédiatre disponible aujourd’hui près de Deïdo.”</li>
        <li>“Boulangerie ouverte avant 6h à Akwa.”</li>
        <li>“Quelles pièces pour déclarer un nouvel employé aux impôts ?”</li>
      </ul>
    </div>
  </div>
</main>
