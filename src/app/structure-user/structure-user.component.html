<div class="dashboard-content-header">
  <div class="search-box">
    <i class="fas fa-search"></i>
    <input type="text" placeholder="Rechercher une structure..." [(ngModel)]="search" class="search-input">
  </div>
</div>

<div *ngIf="loading" class="loading-state">
  <div class="spinner"></div>
  <span>Chargement de vos structures validées...</span>
</div>

<div *ngIf="!loading && filteredStructures.length > 0" class="entreprise-container">
  <div class="entreprise-grid">
    <article class="entreprise-card" *ngFor="let s of filteredStructures" (click)="consulter(s)">
      <div class="card-banner">
        <img *ngIf="s.photoPrincipal" [src]="s.photoPrincipal" [alt]="s.nom">
        <div *ngIf="!s.photoPrincipal" class="placeholder">
          <i class="fas fa-building"></i>
        </div>
      </div>

      <div class="card-body">
        <div class="top">
          <h3>{{s.nom}}</h3>
          <span class="status-badge validee">Validée</span>
        </div>

        <div class="avis-summary" *ngIf="totalAvis > 0">
          <div class="stars">
            <i *ngFor="let star of [1,2,3,4,5]" class="fas fa-star" [class.filled]="star <= moyenneAvis"></i>
          </div>
          <span class="note">{{moyenneAvis}}/5 ({{ totalAvis}} avis)</span>
        </div>

        <p class="category">{{s.categorieNom}}</p>
      </div>

      <div class="card-footer">
        <button class="btn btn-view" (click)="$event.stopPropagation(); consulter(s)">
          <i class="fas fa-external-link-alt"></i> Voir sur le site
        </button>
      </div>
    </article>
  </div>

  <footer class="dashboard-footer">
    <div class="pagination" *ngIf="totalPages > 1">
      <button class="btn btn-pag" (click)="previousPage()" [disabled]="currentPage === 1">
        <i class="fas fa-chevron-left"></i>
      </button>
      <span class="page-info">Page {{currentPage}} sur {{totalPages}}</span>
      <button class="btn btn-pag" (click)="nextPage()" [disabled]="currentPage === totalPages">
        <i class="fas fa-chevron-right"></i>
      </button>
    </div>
  </footer>
</div>

<div *ngIf="!loading && filteredStructures.length === 0" class="empty-state">
  <i class="fas fa-check-circle"></i>
  <p>Vous n'avez pas encore de structures validées.</p>
</div>
