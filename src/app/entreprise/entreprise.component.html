<div class="dashboard-content-header">
   <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" placeholder="Rechercher une structure..." [(ngModel)]="search" class="search-input">
   </div>
</div>

<div *ngIf="loading" class="loading-state">
   <div class="spinner"></div>
   <span>Chargement de vos structures...</span>
</div>

<div *ngIf="!loading && filteredStructures.length > 0" class="entreprise-container">
   <div class="entreprise-grid">
      <article class="entreprise-card" *ngFor="let entreprise of filteredStructures" (click)="consulter(entreprise)">
         <div class="card-banner">
            <img *ngIf="entreprise.photoPrincipal" [src]="entreprise.photoPrincipal" [alt]="entreprise.nom">
            <div *ngIf="!entreprise.photoPrincipal" class="placeholder">
               <i class="fas fa-building"></i>
            </div>
         </div>

         <div class="card-body">
            <div class="top">
               <h3>{{entreprise.nom}}</h3>
               <span class="status-badge" [ngClass]="entreprise.status | lowercase">
                  {{ entreprise.status }}
               </span>
            </div>
            <p class="category">{{entreprise.categorieNom}}</p>
            <p class="desc">{{entreprise.email}}</p>
         </div>

         <div class="card-footer">
            <button class="btn btn-view" (click)="$event.stopPropagation(); consulter(entreprise)">
               <i class="fas fa-eye"></i> Gérer
            </button>
            <button class="btn btn-delete-soft" (click)="$event.stopPropagation(); supprimer(entreprise.id)">
               <i class="fas fa-trash-alt"></i>
            </button>
         </div>
      </article>
   </div>

   <footer class="dashboard-footer">
      <div class="pagination" *ngIf="totalPages > 1">
         <button class="btn btn-pag" (click)="previousPage()" [disabled]="currentPage === 1">
            <i class="fas fa-chevron-left"></i>
         </button>
         <span class="page-info">Page {{currentPage}} sur {{totalPages}}</span>
         <button class="btn btn-pag" (click)="nextPage()" [disabled]="currentPage === totalPages">
            <i class="fas fa-chevron-right"></i>
         </button>
      </div>
   </footer>
</div>

<div *ngIf="!loading && filteredStructures.length === 0" class="empty-state">
   <i class="fas fa-layer-group"></i>
   <p>Aucune structure trouvée.</p>
   <button routerLink="ajout" class="btn btn-primary">Ajouter ma première structure</button>
</div>
