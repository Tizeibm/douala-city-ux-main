<div class="review-composition">
  <div class="composition-header">
    <div class="title-group">
      <h2>Partagez votre expérience</h2>
      <p>Votre avis aide les autres membres de la communauté DoualaCity.</p>
    </div>
    <button class="btn-close-circle" (click)="onCancel()" aria-label="Fermer">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <div class="composition-body">
    <!-- Feedback Messages -->
    <div class="alert-premium error animate-fade-in" *ngIf="errorMessage">
      <i class="fas fa-exclamation-triangle"></i>
      <span>{{ errorMessage }}</span>
    </div>
    <div class="alert-premium success animate-fade-in" *ngIf="successMessage">
      <i class="fas fa-check-double"></i>
      <span>{{ successMessage }}</span>
    </div>

    <form (ngSubmit)="submitAvis()" #avisForm="ngForm" class="premium-form">
      <!-- Step 1: Rating -->
      <div class="form-step">
        <label class="step-label">1. Évaluation globale</label>
        <div class="star-picker-premium">
          <div class="stars-row">
            <i *ngFor="let s of [1,2,3,4,5]" 
               class="fas fa-star" 
               [class.active]="s <= rating"
               [class.hovered]="s <= hoverRating"
               (mouseenter)="hoverRating = s"
               (mouseleave)="hoverRating = 0"
               (click)="setRating(s)">
            </i>
          </div>
          <div class="rating-feedback" [class.visible]="rating > 0 || hoverRating > 0">
            <span class="value">{{ hoverRating || rating }}/5</span>
            <span class="text" *ngIf="(hoverRating || rating) === 1">Décevant</span>
            <span class="text" *ngIf="(hoverRating || rating) === 2">Moyen</span>
            <span class="text" *ngIf="(hoverRating || rating) === 3">Bien</span>
            <span class="text" *ngIf="(hoverRating || rating) === 4">Excellent</span>
            <span class="text" *ngIf="(hoverRating || rating) === 5">Exceptionnel</span>
          </div>
        </div>
      </div>

      <!-- Step 2: Comment -->
      <div class="form-step">
        <label class="step-label" for="commentaire">2. Votre commentaire</label>
        <div class="textarea-wrapper">
          <textarea id="commentaire" 
                    [(ngModel)]="commentaire" 
                    name="commentaire" 
                    rows="8"
                    placeholder="Qu'avez-vous particulièrement apprécié ? Comment l'établissement pourrait-il s'améliorer ?" 
                    required 
                    class="premium-textarea">
          </textarea>
          <div class="char-count" [class.near-limit]="commentaire.length > 400">
            {{ commentaire.length }} / 500
          </div>
        </div>
      </div>

      <!-- Footer Actions -->
      <footer class="composition-footer">
        <button type="submit" class="btn-submit-luxury" [disabled]="!avisForm.valid || loading || rating === 0">
          <span *ngIf="!loading">Publier mon avis <i class="fas fa-paper-plane"></i></span>
          <span *ngIf="loading" class="btn-spinner"></span>
        </button>
        <button type="button" class="btn-secondary-luxury" (click)="onCancel()">
          Annuler
        </button>
      </footer>
    </form>
  </div>
</div>
