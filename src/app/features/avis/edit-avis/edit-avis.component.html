<section class="avis-form">
    <h3>Modifier mon avis</h3>
    <form [formGroup] ="form" (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label for="note">Note (1 à 5):</label>
            <select id="note" formControlName="note" required>
                <option *ngFor="let n of [1,2,3,4,5]" [value]="n">{{ n }}</option>
            </select>
        </div>

        <div class="form-group">
            <label for="commentaire">Commentaire:</label>
            <textarea id="commentaire" formControlName="commentaire" required></textarea>
        </div>

        <div class="form-actions">
            
            <button type="submit" class="btn-submit" [disabled]="form.invalid">Modifier l'avis</button> 
        <button type="button" class="btn-cancel" (click)="onCancel()">Annuler</button>
         </div>



        
    </form>
    </section>
