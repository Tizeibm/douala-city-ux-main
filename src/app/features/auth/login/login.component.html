<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <a routerLink="/" class="auth-logo">
        <span class="logo-icon">D</span>
        DoualaCity
      </a>
      <h1>Connexion</h1>
      <p>Accédez à votre espace personnel</p>
    </div>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm" novalidate class="auth-form">
      <div class="form-group">
        <label for="email">Adresse email</label>
        <div class="input-wrapper" [class.has-error]="emailControl.invalid && (emailControl.dirty || emailControl.touched)">
          <i class="fas fa-envelope"></i>
          <input id="email" type="email" placeholder="vous@exemple.com" [(ngModel)]="email" name="email" required email #emailControl="ngModel" />
        </div>
        <p class="error-msg" *ngIf="emailControl.invalid && (emailControl.dirty || emailControl.touched)">
           Veuillez entrer une adresse email valide.
        </p>
      </div>

      <div class="form-group">
        <div class="label-row">
            <label for="password">Mot de passe</label>
            <a routerLink="/forgot-password" class="forgot-link">Mot de passe oublié ?</a>
        </div>
        <div class="input-wrapper" [class.has-error]="passControl.invalid && (passControl.dirty || passControl.touched)">
          <i class="fas fa-lock"></i>
          <input id="password" type="password" placeholder="••••••••" [(ngModel)]="password" name="password" required minlength="6" #passControl="ngModel" />
        </div>
        <p class="error-msg" *ngIf="passControl.invalid && (passControl.dirty || passControl.touched)">
           Le mot de passe doit contenir au moins 6 caractères.
        </p>
      </div>

      <button type="submit" class="btn-auth-primary" [disabled]="loginForm.invalid">
        Se connecter
      </button>
    </form>

    <p *ngIf="erreur" class="alert-error">
      <i class="fas fa-exclamation-circle"></i> {{erreur}}
    </p>

    <div class="auth-footer">
      <p>Pas encore de compte ? <a routerLink="/inscription">Créer un compte</a></p>
    </div>
  </div>
</div>
